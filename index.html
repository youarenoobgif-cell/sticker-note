<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Sticker Notes (100% Free Cloud)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Kalam:wght@400;700&display=swap');

        body {
            background-color: #f0f3f7;
            background-image: radial-gradient(#d1d9e6 1.5px, transparent 1.5px), radial-gradient(#d1d9e6 1.5px, #f0f3f7 1.5px);
            background-size: 24px 24px;
            background-position: 0 0, 12px 12px;
            font-family: 'Fredoka', sans-serif;
            margin: 0;
            padding: 20px;
        }

        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto 30px auto;
            background: rgba(255, 255, 255, 0.8);
            padding: 15px 25px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            backdrop-filter: blur(5px);
        }

        .brand { font-size: 24px; font-weight: 600; color: #4a5568; }
        
        .add-btn {
            background-color: #a8e6cf;
            color: #2d3748;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .sticker-board {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .note-container { position: relative; padding-top: 15px; }

        .washi-tape {
            position: absolute;
            top: 0; left: 50%; transform: translateX(-50%) rotate(-1deg);
            width: 100px; height: 25px;
            background-color: rgba(255, 211, 182, 0.7);
            border-left: 3px dashed rgba(0,0,0,0.08);
            border-right: 3px dashed rgba(0,0,0,0.08);
            z-index: 10;
        }

        .note {
            background-color: #fff;
            padding: 30px 20px 20px 20px;
            border-radius: 4px;
            box-shadow: 5px 5px 15px rgba(0, 0, 0, 0.06);
            min-height: 250px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .note-header {
            border: none;
            font-family: 'Fredoka', sans-serif;
            font-size: 18px;
            font-weight: 600;
            color: #2d3748;
            width: 100%;
            outline: none;
            margin-bottom: 10px;
            background: transparent;
        }

        .note-body {
            border: none;
            font-family: 'Kalam', cursive;
            font-size: 16px;
            color: #4a5568;
            width: 100%;
            flex-grow: 1;
            resize: none;
            outline: none;
            background: transparent;
        }

        .note-footer {
            display: flex;
            justify-content: flex-end;
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px dashed #e2e8f0;
        }

        .dispose-btn {
            background: none;
            border: none;
            color: #e53e3e;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="header-actions">
        <div class="brand">✨ Free Cloud Workspace</div>
        <button class="add-btn" id="addNoteBtn">+ New Custom Note</button>
    </div>

    <div class="sticker-board" id="stickerBoard"></div>

    <script>
        // Safe Setup: No hardcoded secret keys to trigger security blocks
        const GH_OWNER = "youarenoobgif-cell";
        const GH_REPO = "sticker-note";

        // Retrieves the token securely from your browser cache
        let GH_TOKEN = localStorage.getItem('gh_notes_token');
        
        if (!GH_TOKEN) {
            GH_TOKEN = prompt("Please enter your GitHub Personal Access Token to connect your workspace storage:");
            if (GH_TOKEN) {
                localStorage.setItem('gh_notes_token', GH_TOKEN);
            }
        }

        const headers = {
            'Authorization': `token ${GH_TOKEN}`,
            'Accept': 'application/vnd.github.v3+json'
        };

        const colors = ['#ffebf0', '#e8f4fd', '#fef7e0', '#f3ebff', '#e6fffa'];

        async function loadNotes() {
            if (!GH_TOKEN) return;
            const response = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/issues?state=open`, { headers });
            const issues = await response.json();
            const board = document.getElementById('stickerBoard');
            board.innerHTML = '';
            
            if(Array.isArray(issues)) {
                issues.forEach(issue => {
                    createNoteElement(issue.number, issue.title, issue.body);
                });
            }
        }

        document.getElementById('addNoteBtn').addEventListener('click', async () => {
            await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/issues`, {
                method: 'POST',
                headers,
                body: JSON.stringify({ title: 'New Heading', body: 'Type content here...' })
            });
            loadNotes();
        });

        function createNoteElement(number, title, body) {
            const board = document.getElementById('stickerBoard');
            const container = document.createElement('div');
            container.className = 'note-container';
            
            const randomColor = colors[number % colors.length];

            container.innerHTML = `
                <div class="washi-tape"></div>
                <div class="note" style="background-color: ${randomColor}">
                    <input type="text" class="note-header" value="${title}">
                    <textarea class="note-body">${body}</textarea>
                    <div class="note-footer">
                        <button class="dispose-btn">Dispose Note</button>
                    </div>
                </div>
            `;

            board.appendChild(container);

            const headerInput = container.querySelector('.note-header');
            const bodyTextarea = container.querySelector('.note-body');
            const disposeBtn = container.querySelector('.dispose-btn');

            let timeout;
            const updateNote = () => {
                clearTimeout(timeout);
                timeout = setTimeout(async () => {
                    await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/issues/${number}`, {
                        method: 'PATCH',
                        headers,
                        body: JSON.stringify({ title: headerInput.value, body: bodyTextarea.value })
                    });
                }, 1000);
            };

            headerInput.addEventListener('input', updateNote);
            bodyTextarea.addEventListener('input', updateNote);

            disposeBtn.addEventListener('click', async () => {
                if(confirm("Dispose this note permanently?")) {
                    await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/issues/${number}`, {
                        method: 'PATCH',
                        headers,
                        body: JSON.stringify({ state: 'closed' })
                    });
                    loadNotes();
                }
            });
        }

        loadNotes();
    </script>
</body>
</html>
