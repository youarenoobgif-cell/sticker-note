<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Note Workspace</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Kalam:wght@400;700&family=Inter:wght@400;600&family=Playfair+Display:ital,wght@0,600;1,400&display=swap');
        
        body {
            background-color: #f0f3f7;
            background-image: radial-gradient(#d1d9e6 1.5px, transparent 1.5px), radial-gradient(#d1d9e6 1.5px, #f0f3f7 1.5px);
            background-size: 24px 24px;
            background-position: 0 0, 12px 12px;
            font-family: 'Fredoka', sans-serif;
            margin: 0;
            padding: 20px;
        }
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto 30px auto;
            background: rgba(255, 255, 255, 0.8);
            padding: 15px 25px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            backdrop-filter: blur(5px);
        }
        .brand { font-size: 24px; font-weight: 600; color: #4a5568; }
        .nav-buttons { display: flex; gap: 10px; }
        .btn {
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: all 0.2s ease;
        }
        .add-btn { background-color: #a8e6cf; color: #2d3748; }
        .add-btn:hover { transform: translateY(-2px); }
        .bin-btn { background-color: #e2e8f0; color: #4a5568; }
        
        .sticker-board {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .note-container { 
            position: relative; 
            padding-top: 15px;
            animation: dropIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes dropIn {
            0% { transform: translateY(-20px) rotate(-5deg); opacity: 0; }
            100% { transform: translateY(0) rotate(0deg); opacity: 1; }
        }
        .washi-tape {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%) rotate(-1deg);
            width: 100px;
            height: 25px;
            background-color: rgba(255, 211, 182, 0.7);
            border-left: 3px dashed rgba(0, 0, 0, 0.08);
            border-right: 3px dashed rgba(0, 0, 0, 0.08);
            z-index: 10;
        }
        .note {
            background-color: #fff;
            padding: 30px 20px 20px 20px;
            border-radius: 4px;
            box-shadow: 5px 5px 15px rgba(0, 0, 0, 0.06);
            min-height: 250px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .note:hover {
            transform: scale(1.03) rotate(0.5deg);
            box-shadow: 8px 12px 20px rgba(0, 0, 0, 0.08);
        }
        .note-header {
            border: none;
            font-family: inherit;
            font-size: 18px;
            font-weight: 600;
            color: #2d3748;
            width: 100%;
            outline: none;
            margin-bottom: 10px;
            background: transparent;
        }
        .note-body {
            border: none;
            font-family: inherit;
            font-size: 16px;
            color: #4a5568;
            width: 100%;
            flex-grow: 1;
            resize: none;
            outline: none;
            background: transparent;
        }
        .note-header::placeholder, .note-body::placeholder {
            color: #a0aec0;
            opacity: 0.6;
            font-weight: normal;
        }
        .note-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px dashed #e2e8f0;
        }
        .toolbar select {
            border: none;
            background: rgba(0,0,0,0.05);
            padding: 4px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            margin-right: 5px;
        }
        .dispose-btn {
            background: none;
            border: none;
            color: #e53e3e;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .bin-list { max-height: 200px; overflow-y: auto; margin: 15px 0; padding: 0; list-style: none; }
        .bin-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; font-size: 14px; }
        .modal-footer { display: flex; justify-content: flex-end; gap: 10px; }
    </style>
</head>
<body>
    <div id="appContainer">
        <div class="header-actions">
            <div class="brand">✨ Personal Note</div>
            <div class="nav-buttons">
                <button class="btn bin-btn" id="viewBinBtn">🗑️ Recycle Bin</button>
                <button class="btn add-btn" id="addNoteBtn">+ New Note</button>
            </div>
        </div>
        <div class="sticker-board" id="stickerBoard"></div>
    </div>

    <div class="modal" id="binModal">
        <div class="modal-content">
            <h3>🗑️ Recycle Bin (30 Days Auto-Delete)</h3>
            <p style="font-size: 12px; color: #718096;">Items older than 30 days are automatically permanently dropped.</p>
            <ul class="bin-list" id="binList"></ul>
            <div class="modal-footer">
                <button class="btn bin-btn" id="emptyBinBtn" style="color: #e53e3e;">Clear Bin Manually</button>
                <button class="btn bin-btn" id="closeBinBtn">Close</button>
            </div>
        </div>
    </div>

    <script>
        const paperColors = {
            'Yellow': '#fef7e0', 'Pink': '#ffebf0', 'Blue': '#e8f4fd', 'Purple': '#f3ebff', 'Green': '#e6fffa'
        };
        const fonts = ['Fredoka', 'Kalam', 'Inter', 'Playfair Display'];

        // Core Automated Data Store Engines
        function getActiveNotes() {
            return JSON.parse(localStorage.getItem('automated_active_notes')) || [];
        }
        function setActiveNotes(notes) {
            localStorage.setItem('automated_active_notes', JSON.stringify(notes));
        }
        function getTrashNotes() {
            return JSON.parse(localStorage.getItem('automated_trash_notes')) || [];
        }
        function setTrashNotes(notes) {
            localStorage.setItem('automated_trash_notes', JSON.stringify(notes));
        }

        // Automatic clean cycle running in background for 30 day thresholds
        function automaticBinPurgeCycle() {
            const trash = getTrashNotes();
            const now = Date.now();
            const filteredTrash = trash.filter(item => {
                const daysLeft = 30 - Math.floor((now - item.deletedAt) / (1000 * 60 * 60 * 24));
                return daysLeft > 0; // keeps only if it hasn't expired past 30 days
            });
            setTrashNotes(filteredTrash);
        }

        function loadNotes() {
            automaticBinPurgeCycle();
            const notes = getActiveNotes();
            const board = document.getElementById('stickerBoard');
            board.innerHTML = '';
            
            if (notes.length === 0) {
                initFirstNote();
                return;
            }
            
            notes.forEach(note => {
                createNoteElement(note);
            });
        }

        function initFirstNote() {
            const newNote = {
                id: Date.now(),
                title: '',
                text: '',
                bg: paperColors['Yellow'],
                font: 'Fredoka'
            };
            setActiveNotes([newNote]);
            loadNotes();
        }

        document.getElementById('addNoteBtn').addEventListener('click', () => {
            const notes = getActiveNotes();
            const newNote = {
                id: Date.now(),
                title: '',
                text: '',
                bg: paperColors['Yellow'],
                font: 'Fredoka'
            };
            notes.push(newNote);
            setActiveNotes(notes);
            loadNotes();
        });

        function createNoteElement(note) {
            const board = document.getElementById('stickerBoard');
            const container = document.createElement('div');
            container.className = 'note-container';

            container.innerHTML = `
                <div class="washi-tape"></div>
                <div class="note" style="background-color: ${note.bg}; font-family: '${note.font}', sans-serif;">
                    <input type="text" class="note-header" placeholder="New Heading" value="${note.title}">
                    <textarea class="note-body" placeholder="Type content here...">${note.text}</textarea>
                    <div class="note-footer">
                        <div class="toolbar">
                            <select class="color-select">
                                ${Object.keys(paperColors).map(c => `<option value="${paperColors[c]}" ${paperColors[c]===note.bg?'selected':''}>${c}</option>`).join('')}
                            </select>
                            <select class="font-select">
                                ${fonts.map(f => `<option value="${f}" ${f===note.font?'selected':''}>${f}</option>`).join('')}
                            </select>
                        </div>
                        <button class="dispose-btn">Dispose Note</button>
                    </div>
                </div>
            `;

            board.appendChild(container);

            const headerInput = container.querySelector('.note-header');
            const bodyTextarea = container.querySelector('.note-body');
            const colorSelect = container.querySelector('.color-select');
            const fontSelect = container.querySelector('.font-select');
            const disposeBtn = container.querySelector('.dispose-btn');
            const noteDiv = container.querySelector('.note');

            const saveChanges = () => {
                const notes = getActiveNotes();
                const index = notes.findIndex(n => n.id === note.id);
                if (index !== -1) {
                    notes[index].title = headerInput.value;
                    notes[index].text = bodyTextarea.value;
                    notes[index].bg = colorSelect.value;
                    notes[index].font = fontSelect.value;
                    setActiveNotes(notes);
                }
            };

            headerInput.addEventListener('input', saveChanges);
            bodyTextarea.addEventListener('input', saveChanges);
            
            colorSelect.addEventListener('change', () => {
                noteDiv.style.backgroundColor = colorSelect.value;
                saveChanges();
            });
            fontSelect.addEventListener('change', () => {
                noteDiv.style.fontFamily = `'${fontSelect.value}', sans-serif`;
                saveChanges();
            });

            disposeBtn.addEventListener('click', () => {
                if (confirm("Move this note to the Recycle Bin?")) {
                    const notes = getActiveNotes();
                    const trash = getTrashNotes();
                    const index = notes.findIndex(n => n.id === note.id);
                    
                    if (index !== -1) {
                        const [removed] = notes.splice(index, 1);
                        removed.deletedAt = Date.now();
                        trash.push(removed);
                        setActiveNotes(notes);
                        setTrashNotes(trash);
                        loadNotes();
                    }
                }
            });
        }

        const binModal = document.getElementById('binModal');
        document.getElementById('viewBinBtn').addEventListener('click', () => {
            binModal.style.display = 'flex';
            const trash = getTrashNotes();
            const list = document.getElementById('binList');
            list.innerHTML = '';
            const now = Date.now();
            
            trash.forEach(item => {
                const daysLeft = Math.max(0, 30 - Math.floor((now - item.deletedAt) / (1000 * 60 * 60 * 24)));
                const li = document.createElement('li');
                li.className = 'bin-item';
                li.innerHTML = `<span>${item.title || 'Untitled Note'} (${daysLeft} days remaining)</span>
                                <button onclick="restoreNote(${item.id})" style="cursor:pointer; background:none; border:none; color:#4299e1;">Restore</button>`;
                list.appendChild(li);
            });
        });

        window.restoreNote = (id) => {
            const notes = getActiveNotes();
            const trash = getTrashNotes();
            const index = trash.findIndex(item => item.id === id);
            
            if (index !== -1) {
                const [restored] = trash.splice(index, 1);
                delete restored.deletedAt;
                notes.push(restored);
                setActiveNotes(notes);
                setTrashNotes(trash);
                binModal.style.display = 'none';
                loadNotes();
            }
        };

        document.getElementById('emptyBinBtn').addEventListener('click', () => {
            if (confirm("Manually empty the entire recycle bin permanently?")) {
                setTrashNotes([]);
                binModal.style.display = 'none';
                loadNotes();
            }
        });

        document.getElementById('closeBinBtn').addEventListener('click', () => binModal.style.display = 'none');

        loadNotes();
    </script>
</body>
</html>
